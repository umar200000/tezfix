name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, linux, tezfix]
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync into /opt/tezfix
        run: |
          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='apps/*/node_modules' \
            --exclude='apps/*/dist' \
            --exclude='.env' \
            --exclude='*.db' \
            --exclude='*.db-journal' \
            "$GITHUB_WORKSPACE/" /opt/tezfix/

      - name: Run deploy script
        run: bash /opt/tezfix/deploy/deploy.sh
